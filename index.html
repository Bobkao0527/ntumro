<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTU SmartPath - 穩定導航系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #map-container { position: relative; width: 100%; flex-grow: 1; background: #020617; border-radius: 1rem; overflow: hidden; border: 1px solid #334155; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* 真實位置藍點動畫 */
        .user-dot-pulse {
            position: absolute; width: 12px; height: 12px; background: #3b82f6; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
            box-shadow: 0 0 10px #3b82f6; z-index: 5;
        }
        .user-dot-pulse::after {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%; border: 2px solid #3b82f6; animation: ripple 1.5s infinite;
        }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        
        .loader { border: 3px solid #334155; border-top: 3px solid #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-6 gap-4">

    <!-- Header -->
    <header class="flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-xl md:text-2xl font-bold text-emerald-500 flex items-center gap-2">
                NTU SmartPath
            </h1>
            <p class="text-slate-400 text-[10px] md:text-xs mt-1">智慧校區穩定導航 (起點已鎖定)</p>
        </div>
        <div id="sync-status" class="flex items-center gap-2 text-[10px] md:text-xs text-slate-400 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
            <span id="status-dot" class="flex h-2 w-2 rounded-full bg-slate-500"></span>
            <span id="status-text">初始化...</span>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row gap-4 flex-grow min-h-0">
        <!-- Sidebar -->
        <div class="lg:w-80 space-y-4 shrink-0 flex flex-col">
            <!-- 導航資訊 -->
            <div class="glass-panel p-5 rounded-2xl border-l-4 border-blue-500 shadow-xl">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">導航狀態</h2>
                <div class="space-y-3">
                    <div class="flex items-center gap-3">
                        <div class="text-3xl" id="nav-icon">📍</div>
                        <div class="min-w-0">
                            <div id="nav-text" class="font-bold text-base text-blue-400 truncate">請在地圖選擇終點</div>
                            <div id="nav-dist" class="text-xs text-slate-400">起點將固定於出發位置</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GPS 監測器 -->
            <div class="glass-panel p-4 rounded-xl border border-slate-700/50 bg-slate-800/30">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">真實位置 (GPS)</span>
                    <span id="gps-indicator" class="flex h-2 w-2 rounded-full bg-red-500"></span>
                </div>
                <div id="user-coords" class="font-mono text-xs text-blue-400/80">等待訊號...</div>
                <div class="mt-2 pt-2 border-t border-slate-700 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                    <span class="text-[10px] text-slate-400">藍點：你現在的位置</span>
                </div>
                <div class="mt-1 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <span class="text-[10px] text-slate-400">綠點：導航路徑起點</span>
                </div>
            </div>

            <div class="flex-grow"></div>

            <div class="grid grid-cols-1 gap-2 shrink-0">
                <button onclick="relockStart()" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-xs transition font-bold text-white">更新起點至目前位置</button>
                <button onclick="resetPath()" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs transition border border-white/5 text-slate-400">重設終點</button>
            </div>
        </div>

        <!-- Map Area -->
        <div id="map-container" class="flex-grow">
            <canvas id="mapCanvas"></canvas>
            <div id="user-marker" class="user-dot-pulse hidden"></div>
            <div id="loading-overlay" class="absolute inset-0 bg-slate-900/90 flex items-center justify-center z-10">
                <div class="text-center p-6">
                    <div class="loader mb-4"></div>
                    <div class="text-sm text-slate-400 font-mono">載入地圖並取得初次定位...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const navText = document.getElementById('nav-text');
        const navDist = document.getElementById('nav-dist');
        const userMarker = document.getElementById('user-marker');
        const userCoordsEl = document.getElementById('user-coords');
        const gpsIndicator = document.getElementById('gps-indicator');
        const loadingOverlay = document.getElementById('loading-overlay');

        let nodes = [], edges = [], path = [];
        let startId = null, endId = null;
        let width, height, geoExtents = null;
        let isStartLocked = false; // 是否已鎖定起始點
        let lastKnownPos = null;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpvlZRFEaEAWJxpF58fNWLnZuq7AUPFApMLme3V3c0JkdsGdgVrZSKxwj2VlTOKDvbX6ZJSmiokFA1/pub?output=csv";

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                parseCSV(text);
                startTracking();
                resize();
            } catch (e) { console.error(e); }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            nodes = lines.slice(1).map(line => {
                const c = line.split(',');
                return { id: c[0].trim(), name: c[1].trim(), lng: parseFloat(c[2]), lat: parseFloat(c[3]) };
            }).filter(n => !isNaN(n.lng));
            
            const lngs = nodes.map(n => n.lng), lats = nodes.map(n => n.lat);
            geoExtents = { minLng: Math.min(...lngs), maxLng: Math.max(...lngs), minLat: Math.min(...lats), maxLat: Math.max(...lats) };
            
            // 自動連線邏輯 (同前)
            buildEdges();
        }

        function buildEdges() {
            edges = [];
            const rows = [...new Set(nodes.map(n => n.id.replace(/[^0-9]/g, '')))];
            rows.forEach(r => {
                const group = nodes.filter(n => n.id.includes(r)).sort((a,b) => a.lng - b.lng);
                for(let i=0; i<group.length-1; i++) edges.push({f: group[i].id, t: group[i+1].id, d: calcDist(group[i], group[i+1])});
            });
            const cols = [...new Set(nodes.map(n => n.id.replace(/[0-9]/g, '')))];
            cols.forEach(c => {
                const group = nodes.filter(n => n.id.includes(c)).sort((a,b) => b.lat - a.lat);
                for(let i=0; i<group.length-1; i++) edges.push({f: group[i].id, t: group[i+1].id, d: calcDist(group[i], group[i+1])});
            });
        }

        function calcDist(n1, n2) {
            return Math.hypot((n1.lng-n2.lng)*92000, (n1.lat-n2.lat)*111000);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng } = pos.coords;
                lastKnownPos = { lat, lng };
                userCoordsEl.innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                gpsIndicator.className = "flex h-2 w-2 rounded-full bg-emerald-500";
                
                // 只有在還沒鎖定時，才自動設為起點
                if (!isStartLocked) {
                    startId = findClosest(lng, lat);
                    isStartLocked = true;
                    loadingOverlay.classList.add('hidden');
                }

                updateUserMarker(lng, lat);
                draw();
            }, null, { enableHighAccuracy: true });
        }

        function findClosest(lng, lat) {
            let best = null, min = Infinity;
            nodes.forEach(n => {
                const d = Math.hypot(n.lng - lng, n.lat - lat);
                if(d < min) { min = d; best = n.id; }
            });
            return best;
        }

        function updateUserMarker(lng, lat) {
            const p = getCanvasPos(lng, lat);
            userMarker.style.left = `${p.x}px`;
            userMarker.style.top = `${p.y}px`;
            userMarker.classList.remove('hidden');
        }

        function getCanvasPos(lng, lat) {
            const pad = 50;
            const dw = width - pad*2, dh = height - pad*2;
            const ratio = dw / (geoExtents.maxLng - geoExtents.minLng);
            const x = (lng - geoExtents.minLng) * ratio + pad;
            const y = dh - (lat - geoExtents.minLat) * (dh / (geoExtents.maxLat - geoExtents.minLat)) + pad;
            return { x, y };
        }

        function draw() {
            if(!nodes.length) return;
            ctx.clearRect(0,0,width,height);
            
            // 繪製網格線
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            edges.forEach(e => {
                const p1 = getCanvasPos(nodes.find(n=>n.id===e.f).lng, nodes.find(n=>n.id===e.f).lat);
                const p2 = getCanvasPos(nodes.find(n=>n.id===e.t).lng, nodes.find(n=>n.id===e.t).lat);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            });

            // 繪製路徑
            if(path.length > 1) {
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 5; ctx.lineJoin = 'round';
                ctx.beginPath();
                path.forEach((id, i) => {
                    const n = nodes.find(v=>v.id===id), p = getCanvasPos(n.lng, n.lat);
                    if(i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                });
                ctx.stroke();
            }

            // 繪製節點
            nodes.forEach(n => {
                const p = getCanvasPos(n.lng, n.lat);
                if(n.id === startId) {
                    ctx.fillStyle = '#10b981'; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.fillText("起點", p.x-10, p.y-15);
                } else if(n.id === endId) {
                    ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.fillText(n.name, p.x-10, p.y-15);
                } else {
                    ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill();
                }
            });
        }

        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            let closest = null, min = 30;
            nodes.forEach(n => {
                const p = getCanvasPos(n.lng, n.lat);
                const d = Math.hypot(p.x - x, p.y - y);
                if(d < min) { min = d; closest = n.id; }
            });
            if(closest && closest !== startId) {
                endId = closest;
                path = solve(startId, endId);
                const n = nodes.find(v=>v.id===endId);
                navText.innerText = `目標：${n.name}`;
                draw();
            }
        });

        function solve(s, e) {
            const dist = {}, prev = {}, q = new Set();
            nodes.forEach(n => { dist[n.id] = Infinity; q.add(n.id); });
            dist[s] = 0;
            while(q.size > 0) {
                let u = null;
                q.forEach(id => { if(!u || dist[id] < dist[u]) u = id; });
                if(u === e || dist[u] === Infinity) break;
                q.delete(u);
                edges.filter(ed => ed.f === u || ed.t === u).forEach(ed => {
                    const v = ed.f === u ? ed.t : ed.f;
                    if(!q.has(v)) return;
                    const alt = dist[u] + ed.d;
                    if(alt < dist[v]) { dist[v] = alt; prev[v] = u; }
                });
            }
            const res = []; let curr = e;
            while(curr) { res.unshift(curr); curr = prev[curr]; }
            return res;
        }

        function relockStart() {
            if (lastKnownPos) {
                startId = findClosest(lastKnownPos.lng, lastKnownPos.lat);
                if (endId) path = solve(startId, endId);
                draw();
            }
        }

        function resetPath() { endId = null; path = []; navText.innerText = "請選擇終點"; draw(); }

        function resize() {
            width = canvas.parentElement.clientWidth; height = canvas.parentElement.clientHeight;
            canvas.width = width; canvas.height = height; draw();
            if(lastKnownPos) updateUserMarker(lastKnownPos.lng, lastKnownPos.lat);
        }

        window.onload = init;
        window.onresize = resize;
    </script>
</body>
</html>
