<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTU SmartPath - OSM 遠距偵測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #map { width: 100%; flex-grow: 1; border-radius: 1rem; border: 1px solid #334155; }
        
        /* 隱藏 OSM 預設的縮放按鈕，我們放在右下角 */
        .leaflet-control-zoom { border: none !important; margin-right: 15px !important; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* 距離太遠警示 */
        #far-warning {
            display: none;
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ef4444; color: white; padding: 10px 24px; border-radius: 99px;
            font-weight: bold; font-size: 15px; z-index: 1000; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 自定義使用者藍點 */
        .user-location-icon {
            width: 14px; height: 14px; background: #3b82f6; border: 2px solid white;
            border-radius: 50%; box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="p-4 md:p-6 gap-4">

    <div id="far-warning">🚀 你的距離太遠啦～ (顯示全域地圖)</div>

    <header class="flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-xl md:text-2xl font-bold text-emerald-500 flex items-center gap-2">
                NTU SmartPath
            </h1>
            <p class="text-slate-400 text-[10px] md:text-xs">OSM 底圖輔助系統</p>
        </div>
        <div class="flex items-center gap-2 text-[10px] md:text-xs text-slate-400 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
            <span id="status-dot" class="h-2 w-2 rounded-full bg-emerald-500"></span>
            <span id="status-text">系統運作中</span>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row gap-4 flex-grow min-h-0">
        <!-- Sidebar -->
        <div class="lg:w-80 space-y-4 shrink-0 flex flex-col">
            <div class="glass-panel p-5 rounded-2xl border-l-4 border-blue-500 shadow-xl">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">目前狀態</h2>
                <div id="nav-text" class="font-bold text-base text-blue-400">正在獲取 GPS...</div>
                <div id="nav-dist" class="text-xs text-slate-400 mt-1 italic">--</div>
            </div>

            <div class="glass-panel p-4 rounded-xl border border-slate-700/50 bg-slate-800/30">
                <span class="text-[10px] font-bold text-slate-500 uppercase">GPS 座標</span>
                <div id="user-coords" class="font-mono text-xs text-blue-400/80 mt-1">等待中...</div>
                <div id="campus-tag" class="mt-3 text-[10px] text-emerald-400 font-bold bg-emerald-400/10 px-2 py-1 rounded inline-block">--</div>
            </div>

            <button onclick="zoomToCampus()" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs transition border border-white/5 text-slate-300 font-bold">
                回到校區中心
            </button>
            <button onclick="zoomToAll()" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-xs transition border border-white/5 text-white font-bold">
                同時查看我與校區
            </button>
        </div>

        <!-- Map Container -->
        <div id="map" class="z-0"></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpvlZRFEaEAWJxpF58fNWLnZuq7AUPFApMLme3V3c0JkdsGdgVrZSKxwj2VlTOKDvbX6ZJSmiokFA1/pub?output=csv";
        
        // 校區參考點
        const CAMPUS_REFS = {
            MED: { lat: 25.03966, lng: 121.51973, name: "城中校區" },
            MAIN: { lat: 25.02180, lng: 121.53558, name: "校本部" }
        };

        let map, userMarker, roadNetworkLayer;
        let nodes = [], edges = [];
        let networkBounds;

        function initMap() {
            // 初始化 Leaflet 地圖 (預設為校本部中心)
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([25.02180, 121.53558], 15);

            // 加入 OpenStreetMap 底圖 (使用 Dark Matter 風格較符合 UI，或者標準 OSM)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            loadCSV();
        }

        async function loadCSV() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                parseData(text);
                startTracking();
            } catch (e) { console.error("數據載入失敗", e); }
        }

        function parseData(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            nodes = lines.slice(1).map(line => {
                const c = line.split(',');
                return { id: c[0].trim(), name: c[1].trim(), lng: parseFloat(c[2]), lat: parseFloat(c[3]) };
            }).filter(n => !isNaN(n.lng));

            // 建立路網邊界
            const lats = nodes.map(n => n.lat);
            const lngs = nodes.map(n => n.lng);
            networkBounds = L.latLngBounds([Math.min(...lats), Math.min(...lngs)], [Math.max(...lats), Math.max(...lngs)]);

            // 繪製路網
            renderNetwork();
        }

        function renderNetwork() {
            if (roadNetworkLayer) map.removeLayer(roadNetworkLayer);
            
            const polylineGroup = [];
            // 這裡簡單繪製格狀連線 (邏輯同前一版本)
            const rows = [...new Set(nodes.map(n => n.id.replace(/[^0-9]/g, '')))];
            rows.forEach(r => {
                const group = nodes.filter(n => n.id.includes(r)).sort((a,b) => a.lng - b.lng);
                for(let i=0; i<group.length-1; i++) polylineGroup.push([[group[i].lat, group[i].lng], [group[i+1].lat, group[i+1].lng]]);
            });
            const cols = [...new Set(nodes.map(n => n.id.replace(/[0-9]/g, '')))];
            cols.forEach(c => {
                const group = nodes.filter(n => n.id.includes(c)).sort((a,b) => b.lat - a.lat);
                for(let i=0; i<group.length-1; i++) polylineGroup.push([[group[i].lat, group[i].lng], [group[i+1].lat, group[i+1].lng]]);
            });

            roadNetworkLayer = L.polyline(polylineGroup, { color: '#475569', weight: 1, opacity: 0.6 }).addTo(map);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng } = pos.coords;
                const userLatLng = L.latLng(lat, lng);
                
                // 更新 UI
                document.getElementById('user-coords').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                
                // 距離判斷 (使用 Leaflet 的 distanceTo，單位為公尺)
                const distToMed = userLatLng.distanceTo([CAMPUS_REFS.MED.lat, CAMPUS_REFS.MED.lng]);
                const distToMain = userLatLng.distanceTo([CAMPUS_REFS.MAIN.lat, CAMPUS_REFS.MAIN.lng]);
                const minDist = Math.min(distToMed, distToMain);

                const farWarning = document.getElementById('far-warning');
                const navText = document.getElementById('nav-text');
                const navDist = document.getElementById('nav-dist');

                if (minDist > 4000) {
                    farWarning.style.display = "block";
                    navText.innerText = "你的距離太遠啦～";
                    navDist.innerText = `目前距離最近校區約 ${(minDist/1000).toFixed(1)} km`;
                    
                    // 自動縮放以包含使用者與路網
                    zoomToAll(userLatLng);
                } else {
                    farWarning.style.display = "none";
                    navText.innerText = "已進入校園偵測範圍";
                    navDist.innerText = "地圖已鎖定你的位置";
                }

                // 更新藍點位置
                if (!userMarker) {
                    const icon = L.divIcon({ className: 'user-location-icon', iconSize: [14, 14] });
                    userMarker = L.marker(userLatLng, { icon }).addTo(map);
                } else {
                    userMarker.setLatLng(userLatLng);
                }

            }, err => console.error(err), { enableHighAccuracy: true });
        }

        function zoomToAll(customUserLatLng = null) {
            let combinedBounds = L.latLngBounds(networkBounds);
            if (customUserLatLng) {
                combinedBounds.extend(customUserLatLng);
            } else if (userMarker) {
                combinedBounds.extend(userMarker.getLatLng());
            }
            map.fitBounds(combinedBounds, { padding: [50, 50] });
        }

        function zoomToCampus() {
            map.fitBounds(networkBounds);
        }

        window.onload = initMap;
    </script>
</body>
</html>
